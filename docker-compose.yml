services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: ai_calendar
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        env_file:
            - .env
        networks:
            - app-network

    nginx:
        image: nginx:alpine
        container_name: nginx
        restart: unless-stopped
        ports:
            - "8080:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - app-network

    db:
        image: postgres:16-alpine
        container_name: db
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - app-network

    redis:
        image: redis:7-alpine
        container_name: redis
        restart: unless-stopped
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        networks:
            - app-network

    worker:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: worker
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        command: php artisan queue:work --queue=parsing,logs --sleep=3 --tries=3 --max-time=3600
        depends_on:
            - app
            - redis
            - db
        env_file:
            - .env
        networks:
            - app-network

    node:
        image: node:20-alpine
        container_name: node
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        command: sh -c "npm install && npm run dev"
        ports:
            - "5173:5173"
        networks:
            - app-network

volumes:
    postgres_data:
    redis_data:

networks:
    app-network:
        driver: bridge
